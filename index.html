<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Skills Game - Eurocup Edition</title>
<meta name="description" content="The online soccer game featuring the 2021 Eurocup!">
<meta name="keywords" content="soccer, game, 3D, Eurocup, 2021, play">
<meta name="author" content="Radical Play LLC - Radicalplay.com">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #000;
}
canvas {
    display: block;
    width: 100%;
    height: 100%;
}
@font-face {
    font-family: TekoSkills;
    src: url(data/Teko-Medium.ttf);
}
* { font-family: TekoSkills; }
</style>

<script>
var isphone = true;
var isios = false;
var checkrotate = true;
var rosize = new Image(); rosize.src = "marc/rotate.gif";
var gameorigin = "web"; // changed from androidapp to web
var cupname = "eurocup";
</script>

<script src="https://cdn.jsdelivr.net/gh/nd-pixel/soccer-game@main/soccerskills.js"></script>
</head>

<body onload="setTimeout(gamerun, 100)">

<canvas id="gamecanvas"></canvas>

<script>
var canvasElement = document.getElementById('gamecanvas');
var rd = canvasElement.getContext('2d');
var xm = 0, ym = 0;
var mdown = false;

// --- Touch events ---
canvasElement.addEventListener('touchmove', frmove, false);
canvasElement.addEventListener('touchstart', frdown, false);
canvasElement.addEventListener('touchend', frup, false);

// --- Mouse events ---
canvasElement.addEventListener('mousedown', frdown, false);
canvasElement.addEventListener('mousemove', frmove, false);
canvasElement.addEventListener('mouseup', frup, false);
canvasElement.addEventListener('click', canvasclick, false);

function frmove(evt) {
    var cxm = 0, cym = 0;
    for (var i = 0; i < evt.touches?.length || 0; i++) {
        cxm += evt.touches[i].clientX;
        cym += evt.touches[i].clientY;
    }
    if (evt.touches?.length) {
        var rect = canvasElement.getBoundingClientRect();
        xm = (cxm / evt.touches.length) - rect.left;
        ym = (cym / evt.touches.length) - rect.top;
    } else if (evt.clientX !== undefined) {
        var rect = canvasElement.getBoundingClientRect();
        xm = evt.clientX - rect.left;
        ym = evt.clientY - rect.top;
    }
}

function frdown(evt) { mdown = true; frmove(evt); }
function frup(evt) { mdown = false; }
function adClosed() { adpause = false; }

// --- Resize canvas dynamically ---
function resizeCanvas() {
    canvasElement.width = window.innerWidth;
    canvasElement.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('load', resizeCanvas);

// --- Handle visibility for muting ---
var omutemusic = false;
var omutegame = false;
try {
    document.addEventListener("visibilitychange", function() {
        if (document.visibilityState == "visible") {
            mutemusic = omutemusic;
            mutegame = omutegame;
        } else {
            omutemusic = mutemusic;
            omutegame = mutegame;
            mutemusic = true;
            mutegame = true;
        }
    });
} catch(e) { }
</script>

</body>
</html>
